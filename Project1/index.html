<!DOCTYPE html>
<html>
<head>
    <title>College Event Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>TechFest 2026 🎉</h1>

    <div class="countdown">
        <p id="timer"></p>
    </div>

    <button onclick="changeTheme()">Switch Theme</button>

    <h2>Event Registration</h2>

    <form onsubmit="return showMessage()">
        <input type="text" placeholder="Enter Name" required><br><br>
        <input type="email" placeholder="Enter Email" required><br><br>
        <input type="text" placeholder="Department" required><br><br>
        <button type="submit">Register</button>
    </form>

    <p id="msg"></p>

    <script src="script.js"></script>

</body>
</html>
