<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
    body {
        background-color: #dcdcdc;
        font-family: serif;
        text-align: center;
    }

    h1 {
        margin-top: 40px;
        font-size: 40px;
    }

    .form-box {
        width: 350px;
        margin: 40px auto;
        padding: 30px;
        border: 2px solid purple;
        text-align: left;
        background-color: transparent;
    }

    label {
        display: inline-block;
        width: 80px;
        font-size: 18px;
    }

    input {
        padding: 5px;
        width: 180px;
        margin-bottom: 15px;
    }

    button {
        padding: 5px 10px;
        font-size: 16px;
    }

    .error {
        color: red;
        font-size: 14px;
    }

    #successMsg {
        color: green;
        text-align: center;
        margin-top: 10px;
    }
</style>

<script>
function SubmitButton() {

    let name = document.getElementById('name').value.trim();
    let email = document.getElementById('email').value.trim();
    let password = document.getElementById('password').value.trim();

    document.getElementById('nameError').innerHTML = "";
    document.getElementById('emailError').innerHTML = "";
    document.getElementById('passwordError').innerHTML = "";

    let isValid = true;

    if (name === "") {
        document.getElementById("nameError").innerHTML = "Name field is required";
        isValid = false;
    }

    if (email === "") {
        document.getElementById("emailError").innerHTML = "Email field is required";
        isValid = false;
    }

    if (password === "") {
        document.getElementById("passwordError").innerHTML = "Password field is required";
        isValid = false;
    }

    if (isValid) {
        document.getElementById("successMsg").innerHTML = "Submitted successfully";
    }

    return false;
}
</script>

</head>

<body>

<h1>Registration Form</h1>

<div class="form-box">
    <form onsubmit="return SubmitButton()">

        <label>Name:</label>
        <input type="text" id="name"><br>
        <div id="nameError" class="error"></div>

        <label>Email:</label>
        <input type="text" id="email"><br>
        <div id="emailError" class="error"></div>

        <label>Password:</label>
        <input type="password" id="password"><br>
        <div id="passwordError" class="error"></div>

        <br>
        <button type="submit">Register</button>

        <p id="successMsg"></p>
    </form>
</div>

</body>
</html>
